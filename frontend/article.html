<!doctype html>
<html lang="hi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>टेकदृष्टि | लेख</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anek+Devanagari:wght@400;500;600;700;800&family=Martel+Sans:wght@400;500;700;800&family=Mukta:wght@300;400;600;700;800&family=Rozha+One&family=Yatra+One&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
      --cotton: #f3e8c9;
      --red: #8b2626;
      --indigo: #1a3644;
      --mustard: #d49a36;
      --charcoal: #3a2e2a;
      --panel: rgba(255, 251, 242, 0.9);
      --panel-strong: #fff9ef;
      --line: rgba(58, 46, 42, 0.16);
      --shadow: 0 22px 60px rgba(58, 46, 42, 0.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--charcoal);
      font-family: "Martel Sans", "Mukta", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(212, 154, 54, 0.2), transparent 30%),
        radial-gradient(circle at 88% 10%, rgba(139, 38, 38, 0.12), transparent 22%),
        linear-gradient(180deg, #f7eed3 0%, var(--cotton) 50%, #efe0bb 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.08;
      background-image:
        linear-gradient(transparent 95%, rgba(58, 46, 42, 0.4) 100%),
        linear-gradient(90deg, transparent 95%, rgba(58, 46, 42, 0.24) 100%);
      background-size: 100% 6px, 6px 100%;
      mix-blend-mode: multiply;
    }

    .page {
      width: min(1160px, calc(100% - 28px));
      margin: 0 auto;
      padding: 18px 0 32px;
      position: relative;
      z-index: 1;
    }

    .elephant-banner,
    .footer-banner {
      width: 100%;
      height: 140px;
      border-bottom: 4px solid var(--mustard);
      background-color: var(--red);
      background-image: url('wmremove-transformed.jpeg');
      background-repeat: repeat-x;
      background-position: center;
      background-size: auto 100%;
      box-shadow: inset 0 -10px 30px rgba(0, 0, 0, 0.08);
      position: relative;
    }

    .elephant-banner::after,
    .footer-banner::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(180deg, rgba(139, 38, 38, 0.12), rgba(139, 38, 38, 0) 24%, rgba(139, 38, 38, 0) 76%, rgba(139, 38, 38, 0.14));
    }

    .header {
      background: rgba(255, 248, 234, 0.78);
      border: 1px solid var(--line);
      border-top: 0;
      box-shadow: var(--shadow);
      position: relative;
      z-index: 1;
    }

    .header-inner {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 16px;
      padding: 18px 22px 20px;
    }

    .header-action {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      border: 0;
      background: transparent;
      color: var(--red);
      font-family: "Mukta", sans-serif;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
    }

    .header-action svg {
      width: 20px;
      height: 20px;
      flex: none;
    }

    .brand {
      text-align: center;
      text-decoration: none;
      color: var(--red);
      line-height: 1;
    }

    .brand-title {
      display: block;
      font-family: "Rozha One", serif;
      font-size: clamp(2.5rem, 4vw, 4rem);
      font-weight: 400;
      letter-spacing: 0;
    }

    .brand-subtitle {
      display: block;
      margin-top: 6px;
      font-size: 0.72rem;
      color: var(--charcoal);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-family: "Mukta", sans-serif;
      font-weight: 700;
    }

    .header-cta {
      justify-self: end;
      border: 2px solid var(--red);
      color: var(--red);
      background: transparent;
      padding: 11px 18px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      border-radius: 2px;
      text-decoration: none;
    }

    .main {
      padding: 30px 0 22px;
    }

    .article-shell {
      background: rgba(255, 250, 242, 0.95);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .article-shell article {
      display: grid;
      gap: 22px;
    }

    .article-visual {
      min-height: 460px;
      background:
        radial-gradient(circle at 40% 30%, rgba(212, 154, 54, 0.45), transparent 22%),
        radial-gradient(circle at 65% 28%, rgba(139, 38, 38, 0.18), transparent 18%),
        linear-gradient(135deg, #f6e7c2 0%, #ecd29d 52%, #f8edd6 100%);
      position: relative;
      overflow: hidden;
    }

    .article-visual img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .article-visual::before {
      content: "";
      position: absolute;
      inset: 18px;
      border: 1px solid rgba(58, 46, 42, 0.12);
    }

    .article-visual::after {
      content: "✦";
      position: absolute;
      inset: 50% auto auto 50%;
      transform: translate(-50%, -50%);
      color: var(--red);
      font-size: 4rem;
      text-shadow: 0 6px 24px rgba(139, 38, 38, 0.12);
    }

    .article-copy {
      padding: 30px;
      display: grid;
      gap: 18px;
    }

    .article-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      color: rgba(58, 46, 42, 0.8);
      font: 700 0.76rem/1 "Yatra One", serif;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .pill {
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(139, 38, 38, 0.08);
      color: var(--red);
      font-family: "Yatra One", serif;
      font-weight: 400;
    }

    h1 {
      margin: 0;
      color: var(--red);
      font-family: "Anek Devanagari", "Mukta", sans-serif;
      font-size: clamp(2.2rem, 4vw, 3.8rem);
      line-height: 1.08;
      letter-spacing: -0.04em;
    }

    .lede {
      margin: 0;
      color: rgba(58, 46, 42, 0.9);
      font-size: 1.06rem;
      line-height: 1.9;
      font-family: "Martel Sans", "Mukta", sans-serif;
    }

    .content-card {
      padding: 22px;
      background: var(--panel-strong);
      border: 1px solid var(--line);
      display: grid;
      gap: 14px;
    }

    .section-title {
      margin: 0;
      color: var(--red);
      font-family: "Yatra One", serif;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 0.78rem;
    }

    .article-body {
      margin: 0;
      color: rgba(58, 46, 42, 0.95);
      line-height: 1.95;
      font-family: "Martel Sans", "Mukta", sans-serif;
      font-size: 1.02rem;
    }

    .article-body p {
      margin: 0 0 14px;
    }

    .article-body p:last-child {
      margin-bottom: 0;
    }

    .article-body .subhead {
      margin: 18px 0 10px;
      color: var(--red);
      font-family: "Anek Devanagari", "Mukta", sans-serif;
      font-size: 1.18rem;
      line-height: 1.35;
      font-weight: 700;
    }

    .story-grid {
      display: grid;
      gap: 18px;
    }

    .story-panel {
      padding: 20px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid var(--line);
      display: grid;
      gap: 14px;
    }

    .story-panel h2 {
      margin: 0;
      color: var(--red);
      font-family: "Anek Devanagari", "Mukta", sans-serif;
      font-size: clamp(1.4rem, 2.6vw, 2rem);
      line-height: 1.15;
    }

    .story-panel p {
      margin: 0;
      color: rgba(58, 46, 42, 0.95);
      line-height: 1.95;
      font-family: "Martel Sans", "Mukta", sans-serif;
      font-size: 1rem;
    }

    .story-notes {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .note-card {
      padding: 16px;
      background: var(--panel-strong);
      border: 1px solid var(--line);
      display: grid;
      gap: 10px;
    }

    .note-card span {
      color: var(--red);
      font-family: "Yatra One", serif;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-size: 0.75rem;
    }

    .note-card strong {
      font-family: "Anek Devanagari", "Mukta", sans-serif;
      color: var(--charcoal);
      line-height: 1.4;
      font-size: 1rem;
      font-weight: 700;
    }

    .quote-box {
      padding: 18px 20px;
      border-left: 4px solid var(--red);
      background: rgba(139, 38, 38, 0.05);
      font-family: "Anek Devanagari", "Mukta", sans-serif;
      color: var(--red);
      line-height: 1.75;
      font-size: 1rem;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .actions a,
    .actions button {
      text-decoration: none;
      border-radius: 2px;
      padding: 10px 14px;
      font-weight: 800;
      font-family: "Mukta", sans-serif;
      cursor: pointer;
    }

    .actions a {
      background: var(--red);
      color: var(--cotton);
      border: 1px solid var(--red);
    }

    .actions button {
      background: transparent;
      color: var(--red);
      border: 1px solid rgba(139, 38, 38, 0.25);
    }

    .note {
      margin: 0;
      color: rgba(58, 46, 42, 0.76);
      line-height: 1.8;
      font-size: 0.96rem;
    }

    .footer {
      background: rgba(255, 248, 234, 0.78);
      border: 1px solid var(--line);
      border-bottom: 0;
      box-shadow: var(--shadow);
      margin-top: 28px;
    }

    .footer-inner {
      padding: 30px 20px 36px;
      text-align: center;
    }

    .footer-inner h2 {
      margin: 0 0 10px;
      color: var(--red);
      font-size: clamp(2rem, 3.4vw, 3rem);
    }

    .footer-inner p {
      max-width: 720px;
      margin: 0 auto 22px;
      line-height: 1.9;
      color: rgba(58, 46, 42, 0.78);
    }

    .footer-line {
      width: 112px;
      height: 2px;
      margin: 0 auto 18px;
      background: var(--red);
    }

    .copyright {
      font: 700 0.75rem/1 "Yatra One", serif;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--red);
    }

    .empty-state {
      padding: 28px;
      border: 1px dashed rgba(58, 46, 42, 0.24);
      background: rgba(255, 250, 242, 0.85);
      line-height: 1.8;
      color: rgba(58, 46, 42, 0.82);
    }

    @media (max-width: 980px) {
      .article-copy {
        padding: 24px;
      }
    }

    @media (max-width: 640px) {
      .page { width: min(100% - 18px, 1160px); }
      .header-inner {
        grid-template-columns: 1fr;
        text-align: center;
      }

      .header-cta,
      .header-action {
        justify-self: center;
      }

      .article-copy {
        padding: 22px 18px;
      }
    }
  </style>
</head>
<body>
  <div class="elephant-banner"></div>

  <header class="header">
    <div class="page header-inner">
      <a class="header-action" href="index.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M15 18l-6-6 6-6"></path>
        </svg>
        <span>वापस</span>
      </a>

      <a class="brand" href="index.html">
        <span class="brand-title">टेकदृष्टि</span>
        <span class="brand-subtitle">विज्ञान एवं प्रज्ञान</span>
      </a>

      <a class="header-cta" href="index.html">मुख्य पृष्ठ</a>
    </div>
  </header>

  <main class="page main">
    <section class="article-shell" id="articleShell" hidden>
        <article>
          <div class="article-copy">
            <div class="article-meta" id="articleMeta"></div>
            <h1 id="articleTitle"></h1>
            <p class="lede" id="articleLede"></p>
            <div class="article-visual" id="articleVisual" aria-hidden="true"></div>
            <div class="content-card">
              <p class="section-title">संपादकीय परिचय</p>
              <p class="article-body" id="articleBody"></p>
              <div class="actions" id="articleActions"></div>
            </div>
          </div>

          <div class="story-grid">
            <section class="story-panel" id="articleQuotePanel" hidden>
              <h2>संपादकीय अंश</h2>
              <div class="quote-box" id="articleQuote"></div>
            </section>

            <section class="story-panel">
              <h2>स्रोत विवरण</h2>
              <div class="story-notes" id="articleNotes"></div>
            </section>
          </div>
        </article>
    </section>

    <section class="empty-state" id="emptyState" hidden>
      लेख नहीं मिला. मुख्य पृष्ठ से किसी लेख पर क्लिक करें.
    </section>
  </main>

  <footer class="footer">
    <div class="footer-banner"></div>
    <div class="page footer-inner">
      <h2>टेकदृष्टि</h2>
      <p>विज्ञान और प्रौद्योगिकी की प्रीमियम हिंदी पत्रिका, साफ़ पढ़ने और मौलिक रिपोर्टिंग पर केंद्रित.</p>
      <div class="footer-line"></div>
      <div class="copyright">&copy; 2026 टेकदृष्टि. सर्वाधिकार सुरक्षित.</div>
    </div>
  </footer>

  <script>
    const articleShell = document.getElementById('articleShell');
    const emptyState = document.getElementById('emptyState');
    const articleMeta = document.getElementById('articleMeta');
    const articleVisual = document.getElementById('articleVisual');
    const articleTitle = document.getElementById('articleTitle');
    const articleLede = document.getElementById('articleLede');
    const articleBody = document.getElementById('articleBody');
    const articleActions = document.getElementById('articleActions');
    const articleQuotePanel = document.getElementById('articleQuotePanel');
    const articleQuote = document.getElementById('articleQuote');
    const articleNotes = document.getElementById('articleNotes');

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function stripHtml(value) {
      const doc = new DOMParser().parseFromString(String(value || ''), 'text/html');
      return doc.body.textContent || '';
    }

    function sourceLabel(value) {
      if (value === 'rss') return 'आरएसएस';
      if (value === 'github') return 'गिटहब';
      if (value === 'synthesized') return 'मूल लेख (एआई)';
      return 'स्रोत';
    }

    function hostOf(item) {
      try {
        return new URL(item.url, window.location.href).hostname.replace(/^www\./, '');
      } catch {
        return 'स्रोत';
      }
    }

    // Splits the translated summary into sentences for paragraph/quote use;
    // there is no separate "body" text from the pipeline, only this summary.
    function summarySentences(item) {
      const text = stripHtml(item.summary || '').trim();
      if (!text) return [];
      return text.split(/(?<=[।.!?])\s+/).filter(Boolean);
    }

    function buildBody(item) {
      const sentences = summarySentences(item);
      if (!sentences.length) {
        return `<p>इस लेख के लिए स्रोत से कोई सारांश उपलब्ध नहीं था. कृपया नीचे दिए गए लिंक से मूल रिपोर्ट पढ़ें.</p>`;
      }
      return `<p>${escapeHtml(sentences.join(' '))}</p>`;
    }

    function buildNotes(item) {
      const notes = [
        { label: 'स्रोत', text: sourceLabel(item.source) },
        { label: 'वेबसाइट', text: hostOf(item) },
      ];
      if (item.published) {
        notes.push({ label: 'प्रकाशित', text: item.published });
      }
      notes.push({ label: 'भाषा', text: item.language === 'hindi' ? 'हिंदी (अनुवादित)' : 'अन्य' });
      return notes;
    }

    async function init() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id') || '';

      try {
        const response = await fetch('output/articles_hindi.json', { cache: 'no-store' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const items = await response.json();
        const item = Array.isArray(items) ? items.find((it) => it.id === id) : null;

        if (!item) {
          articleShell.hidden = true;
          emptyState.hidden = false;
          return;
        }

        articleMeta.innerHTML = `
          <span class="pill">${escapeHtml(sourceLabel(item.source))}</span>
          <span>${escapeHtml(item.language === 'hindi' ? 'हिंदी' : 'अन्य')}</span>
          <span>${escapeHtml(hostOf(item))}</span>
        `;
        articleTitle.textContent = item.title || 'शीर्षक उपलब्ध नहीं है';
        articleVisual.innerHTML = item.image
          ? `<img src="${escapeHtml(item.image)}" alt="" loading="lazy" onerror="this.remove()">`
          : '';

        const sources = Array.isArray(item.sources) && item.sources.length ? item.sources : [item.url].filter(Boolean);
        articleLede.textContent = sources.length > 1
          ? `यह ${sources.length} स्रोतों के तथ्यों पर आधारित एक मूल हिंदी लेख है — मूल स्रोत पढ़ने के लिए नीचे लिंक देखें.`
          : 'यह स्रोत लेख का मशीन-अनुवादित सारांश है — पूरा लेख पढ़ने के लिए मूल स्रोत खोलें.';
        articleBody.innerHTML = buildBody(item);
        articleActions.innerHTML = `
          ${sources.map((url, i) => `<a href="${escapeHtml(url)}" target="_blank" rel="noreferrer">मूल स्रोत${sources.length > 1 ? ` ${i + 1}` : ''} खोलें</a>`).join('')}
          <a href="index.html">वापस सूची में जाएँ</a>
        `;

        const sentences = summarySentences(item);
        if (sentences.length) {
          articleQuote.textContent = sentences[0];
          articleQuotePanel.hidden = false;
        } else {
          articleQuotePanel.hidden = true;
        }

        const notes = buildNotes(item);
        articleNotes.innerHTML = notes.map((note) => `
          <div class="note-card">
            <span>${escapeHtml(note.label)}</span>
            <strong>${escapeHtml(note.text)}</strong>
          </div>
        `).join('');
        articleShell.hidden = false;
        emptyState.hidden = true;
      } catch (error) {
        articleShell.hidden = true;
        emptyState.hidden = false;
      }
    }

    init();
  </script>
</body>
</html>
