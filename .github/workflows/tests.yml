name: Tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      # tests/test_cluster.py exercises the real all-mpnet-base-v2 model
      # (writer/cluster.py), so pytest needs it downloaded too — same cache
      # as daily.yml, see that file for the rationale on key choice and size.
      - name: Cache sentence-transformers model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-model-all-mpnet-base-v2-v1
          restore-keys: |
            hf-model-all-mpnet-base-v2-

      - name: Run pytest
        env:
          HF_HUB_DISABLE_XET: "1"
        run: pytest -q
