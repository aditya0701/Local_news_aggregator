name: Daily Pipeline

on:
  schedule:
    - cron: '30 2 * * *'   # 8:00 AM IST (02:30 UTC)
  workflow_dispatch:        # allow manual trigger from GitHub UI

permissions:
  contents: write           # needed to commit updated JSON back to repo

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Caches the ~420MB all-mpnet-base-v2 embedding model (writer/cluster.py)
      # so it's downloaded from Hugging Face once, not on every daily run.
      # Fixed key (no requirements.txt hash) since the model itself doesn't
      # change when unrelated deps do; a daily cron run keeps this cache's
      # 7-day inactivity clock from ever expiring it. Well within GitHub's
      # 10GB-per-repo cache allowance at this size.
      - name: Cache sentence-transformers model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-model-all-mpnet-base-v2-v1
          restore-keys: |
            hf-model-all-mpnet-base-v2-

      - name: Run pipeline
        env:
          SARVAM_API_KEY: ${{ secrets.SARVAM_API_KEY }}
          SARVAM_MODEL: sarvam-30b
          SARVAM_MODEL_QUALITY: sarvam-105b
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          PYTHONIOENCODING: utf-8
          # Disables Hugging Face's newer "xet" transfer backend. Confirmed
          # directly during development: xet repeatedly hit connection
          # timeouts against huggingface.co and stalled the model download
          # for 10+ minutes before ever falling back; the plain HTTP
          # downloader (this flag) fetched the same file in under a minute.
          HF_HUB_DISABLE_XET: "1"
        run: python pipeline.py

      - name: Commit updated articles and cache
        run: |
          git config user.name "TechDrishti Bot"
          git config user.email "bot@techdrishti.github.io"
          git add output/articles_hindi.json data/entity_cache.json output/pipeline_trace.json
          git diff --cached --quiet && echo "Nothing to commit" || git commit -m "chore: daily pipeline run $(date -u +%Y-%m-%d)"
          git push
